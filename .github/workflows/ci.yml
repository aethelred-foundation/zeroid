name: ZeroID CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.75'

jobs:
  # ===========================================================================
  # SECURITY
  # ===========================================================================
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: NPM Security Audit
        run: npm audit --audit-level=moderate

  # ===========================================================================
  # LINT & TYPE-CHECK
  # ===========================================================================
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run type-check
      - run: npm run format:check

  # ===========================================================================
  # FRONTEND TESTS
  # ===========================================================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run test:ci
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: frontend
        continue-on-error: true

  # ===========================================================================
  # BACKEND TESTS
  # ===========================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run backend tests
        working-directory: ./backend
        run: npm test

  # ===========================================================================
  # SMART CONTRACT TESTS
  # ===========================================================================
  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run Hardhat tests
        run: npx hardhat test
      - name: Run Forge tests
        run: forge test -vvv

  # ===========================================================================
  # RUST TEE CRATE
  # ===========================================================================
  test-rust:
    name: Rust TEE Crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - name: Check formatting
        working-directory: ./crates/zeroid-tee
        run: cargo fmt -- --check
      - name: Run Clippy
        working-directory: ./crates/zeroid-tee
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        working-directory: ./crates/zeroid-tee
        run: cargo test

  # ===========================================================================
  # GO SDK TESTS
  # ===========================================================================
  test-go:
    name: Go SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go tests
        working-directory: ./sdk/go
        run: go test ./...

  # ===========================================================================
  # BUILD
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-format, test-frontend, test-backend, test-contracts, test-rust, test-go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
