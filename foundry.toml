[profile.default]
src = "contracts"
test = "test/foundry"
out = "foundry-out"
libs = ["node_modules", "lib"]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[profile.default.fuzz]
runs = 256
